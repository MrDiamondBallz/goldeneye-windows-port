# GoldenEye 007 USA N64Recomp config spike
#
# This is a private/local scaffold for turning the verified N64 decomp ELF + ROM
# into N64Recomp C output. Generated output is ignored and must not be committed.

[input]
entrypoint = 0x80000400
elf_path = "../../../../007/build/u/ge007.u.elf"
rom_file_path = "../../../../007/baserom.u.z64"
output_func_path = "../generated/us_recomp"

# GoldenEye's ELF is MIPS3/o32 and the ROM header entrypoint is 0x80000400.
uses_mips3_float_mode = true

# Keep output chunked enough for early inspection/build experiments.
functions_per_output_file = 200

# Start simple: parse ELF symbols/sections first. mdebug mapping can be added
# once we know which source/overlay names matter for native build hygiene.
use_mdebug = false
unpaired_lo16_warnings = true

# Default include used by generated files. The app scaffold must provide this.
recomp_include = "#include \"recomp.h\""

[patches]
stubs = []

# First known N64Recomp analysis blocker from the raw GoldenEye ELF:
# sizepropdef uses a switch/jump table whose size is not inferred from the ELF/rodata
# layout yet. Keep it ignored for the initial scaffold spike; later solve properly
# with better symbol/rodata metadata or a targeted patch.
# boot touches low-level N64 cop0/PI/boot hardware and is not part of the native
# app entry path; the port runtime will replace that initialization layer.
ignored = [
    "sizepropdef",
    "boot",
    "resolve_TLBaddress_for_InvalidHit",
    "initTLBPrepareContext",
    # Debug registry is safe to replace in the native harness. The generated
    # version creates a linked list of debug entries and can stall the guarded
    # main-thread probe in debFind/strcmp before scheduler/video work starts.
    "debFind",
    "debAllocate",
    "debAdd",
    "debTryAdd",
    "debInit",
    # Full reverb/effects construction is host-audio work. Keep the synth path
    # moving with a no-op effect constructor until the native audio backend exists.
    "alFxNew",
    # Temporary host bump allocator for early native-runtime probes. The generated
    # allocator currently reaches its panic self-loop because full memp bank setup
    # is not modeled yet.
    "mempAllocBytesInBank",
    "mempAddEntryOfSizeToBank",
    # Audio bank loading/decompression is skipped until the native audio backend
    # and asset streaming model are in place.
    "musicSeqPlayerInit",
    # Generic compressed asset expansion is still a runtime/asset-streaming surface.
    # No-op it for the probe instead of burning time in generated zlib with stubbed
    # memory/audio state.
    "decompressdata",
    "alCSeqNew",
    # Host frame pump: replace the generated busy-wait with a deterministic
    # frame tick so guarded probes can advance one or more frames safely.
    "waitForNextFrame",
    # Native RSP/display-list boundary. Stop guarded probes here instead of
    # burning CPU in the title loop until a host renderer/scheduler owns tasks.
    "rspGfxTaskStart",
    # Mis-typed as FUNC in the decomp ELF but is a packed data table, not code.
    "eqpower",
]
renamed = []
